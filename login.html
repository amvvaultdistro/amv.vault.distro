<!DOCTYPE html>
<html>
<head>
    <title>Login | AMV Vault</title>
    <script
      async
      crossorigin="anonymous"
      data-clerk-publishable-key="pk_test_Z29vZC1naXJhZmZlLTc5LmNsZXJrLmFjY291bnRzLmRldiQ"
      src="https://good-giraffe-79.clerk.accounts.dev/npm/@clerk/clerk-js@latest/dist/clerk.browser.js"
      type="text/javascript"
    ></script>
</head>
<body style="background-color: #000; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; font-family: sans-serif;">

    <div id="sign-in"></div>

    <script>
        window.addEventListener('load', async function () {
            if (window.Clerk) {
                await Clerk.load();
                
                // Determine where the user was trying to go
                const pendingPlan = localStorage.getItem('pendingPlan') || 'Basic';
                let targetUrl = "dashboard.html"; // Default

                if (pendingPlan === 'Label') {
                    targetUrl = "label.html";
                } else if (pendingPlan === 'LabelPro') {
                    targetUrl = "label-pro.html";
                }

                // 1. AUTO-REDIRECT: If already logged in, jump to their specific plan
                if (Clerk.user) {
                    window.location.href = targetUrl; 
                    return;
                }
                
                // 2. MOUNT SIGN-IN: Force login and redirect to the specific plan page
                const signInDiv = document.getElementById("sign-in");
                
                Clerk.mountSignIn(signInDiv, {
                    // This ensures they go to the right place after entering email/pass
                    afterSignInUrl: targetUrl,
                    afterSignUpUrl: targetUrl,
                    appearance: {
                        variables: {
                            colorPrimary: '#D4AF37', // Gold theme to match AMV Vault
                        },
                        layout: {
                            logoPlacement: 'inside',
                            socialButtonsPlacement: 'bottom'
                        }
                    }
                });
            } else {
                document.body.innerHTML = "<h2 style='color:white;'>Gate Error: Check Connection</h2>";
            }
        });
    </script>
</body>
</html>
