<!DOCTYPE html>
<html lang="zxx">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Label Hub | AMV Vault</title>
    <script async crossorigin="anonymous" data-clerk-publishable-key="pk_test_Z29vZC1naXJhZmZlLTc5LmNsZXJrLmFjY291bnRzLmRldiQ" src="https://good-giraffe-79.clerk.accounts.dev/npm/@clerk/clerk-js@latest/dist/clerk.browser.js" type="text/javascript"></script>
    <link rel="stylesheet" href="css/bootstrap.min.css" type="text/css">
    <link rel="stylesheet" href="css/font-awesome.min.css" type="text/css">
    <style>
        body { background: #050505; color: #fff; font-family: 'Inter', sans-serif; }
        .header { background: #000; border-bottom: 2px solid #D4AF37; padding: 15px 0; }
        .pro-badge { background: #D4AF37; color: #000; padding: 2px 8px; border-radius: 4px; font-size: 12px; font-weight: 900; margin-left: 10px; }
        .label-name-display { color: #fff; font-weight: 900; font-size: 3.5rem; text-transform: uppercase; }
        .artist-card { background: #111; border: 1px solid #222; border-radius: 10px; padding: 20px; text-align: center; transition: 0.3s; height: 100%; }
        .artist-card:hover { border-color: #D4AF37; background: #161616; }
        .manage-btn { display: block; padding: 10px; background: #D4AF37; color: #000; border-radius: 5px; text-decoration: none; font-size: 12px; font-weight: 700; margin-top: 15px; border:none; width: 100%; }
    </style>
</head>
<body>

    <header class="header">
        <div class="container d-flex justify-content-between align-items-center">
            <div><strong style="color:#D4AF37; letter-spacing:2px;">AMV VAULT</strong> <span class="pro-badge">PRO</span></div>
            <div id="user-button"></div>
        </div>
    </header>

    <div class="container py-5">
        <div class="text-center mb-5">
            <h1 id="labelNamePro" class="label-name-display">...</h1>
            <p class="text-warning">Elite 10-Artist Roster Unlocked</p>
        </div>

        <div class="row g-3" id="proArtistGrid"></div>
    </div>

    <script>
        window.addEventListener('load', async function() {
            await Clerk.load();
            if (!Clerk.user) {
                window.location.href = "login.html";
            } else {
                Clerk.mountUserButton(document.getElementById('user-button'));
                initProLabel();
            }
        });

        function initProLabel() {
            let savedLabel = localStorage.getItem('amv_label_name');
            document.getElementById('labelNamePro').innerText = savedLabel || "Label Elite";
            renderProArtists(10);
        }

        function setProArtistName(slotId) {
            let name = prompt("Enter Artist Name for Pro Slot " + slotId + ":");
            if (name) {
                localStorage.setItem(`artist_slot_pro_${slotId}`, name);
                location.reload();
            }
        }

        function renderProArtists(count) {
            const grid = document.getElementById('proArtistGrid');
            for (let i = 1; i <= count; i++) {
                let name = localStorage.getItem(`artist_slot_pro_${i}`);
                let isSetup = !!name;
                grid.innerHTML += `
                    <div class="col-lg-3 col-md-4 col-6">
                        <div class="artist-card">
                            <small class="text-muted">SLOT ${i}</small>
                            <div class="artist-thumb my-3"><i class="fa ${isSetup ? 'fa-microphone' : 'fa-plus'} fa-2x text-warning"></i></div>
                            <h6 class="text-truncate">${name || 'Empty Space'}</h6>
                            ${isSetup 
                                ? `<a href="dashboard.html" class="manage-btn">Manage</a>` 
                                : `<button onclick="setProArtistName(${i})" class="manage-btn" style="background:#222; color:#888;">Set Name</button>`}
                        </div>
                    </div>
                `;
            }
        }
    </script>
</body>
</html>
